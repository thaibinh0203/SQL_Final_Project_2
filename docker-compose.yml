services:
  db:
    build:
      context: .
      dockerfile: database/Dockerfile.mysql
    container_name: recruitment-db
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: railway
    ports:
      - "3306:3306"
    volumes:
      - recruitment_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -prootpassword --silent"]
      interval: 10s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: recruitment-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      DB_USER: root
      DB_PASSWORD: rootpassword
      DB_NAME: railway
      DB_ECHO: "false"
      JWT_SECRET: local-development-secret-change-before-deploy
      JWT_EXP_MINUTES: "120"
      FRONTEND_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      PORT: "8000"
    ports:
      - "8000:8000"
    volumes:
      - recruitment_uploads:/app/uploads

  frontend:
    image: node:22-alpine
    container_name: recruitment-frontend
    working_dir: /app
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    volumes:
      - ./web:/app
      - recruitment_web_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev -- -p 3000 -H 0.0.0.0"

volumes:
  recruitment_mysql_data:
  recruitment_uploads:
  recruitment_web_node_modules:
