services:
  - type: web
    name: recruitment-system-api
    runtime: python
    plan: free
    autoDeploy: true
    healthCheckPath: /health
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_ECHO
        value: "false"
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXP_MINUTES
        value: "120"
      - key: FRONTEND_ORIGINS
        sync: false
